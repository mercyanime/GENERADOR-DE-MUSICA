        h1 {color:#f59e0b; margin-bottom:25px; font-size:1.8rem;}
        .caja-palabras {display:flex; flex-wrap:wrap; justify-content:center; gap:12px; margin:30px 0;}
        .palabra {background:#1e1e1e; border:2px solid #f59e0b; padding:15px 20px; border-radius:10px; font-size:1.4rem; font-weight:bold; color:#f59e0b; min-width:110px;}
        button {background:#f59e0b; color:#000; border:none; padding:15px 30px; font-size:1.1rem; font-weight:bold; border-radius:8px; cursor:pointer; transition:0.2s;}
        button:hover {background:#d97706; transform:scale(1.03);}
        .info {margin-top:20px; color:#aaa; font-size:0.95rem;}
        audio {width:100%; margin:20px 0; border-radius:8px;}
    </style>
</head>

<!-- Reproductor de beat -->
<audio controls>

// GENERAR 4 PALABRAS AL AZAR
function generar(){
    const caja = document.getElementById("caja");
    const seleccionadas = [];
    while(seleccionadas.length < 4){
        const palabra = PALABRAS[Math.floor(Math.random() * PALABRAS.length)];
        if(!seleccionadas.includes(palabra)) seleccionadas.push(palabra);
    }
    caja.innerHTML = seleccionadas.map(p => `<div class="palabra">${p}</div>`).join("");
}

// CARGAR AL INICIO
