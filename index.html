<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador Rap - Base con Palabras</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: #0a0a0a;
            color: #fff;
            min-height: 100vh;
            padding: 20px;
            max-width: 480px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 30px;
        }

        .logo {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: #1a1a1a;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            color: #ff8c00;
        }

        .menu-btn {
            font-size: 28px;
            color: #ff8c00;
            background: none;
            border: none;
            cursor: pointer;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
        }

        .tab {
            flex: 1;
            padding: 15px;
            border-radius: 12px;
            border: none;
            background: #1a1a1a;
            color: #888;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-align: left;
        }

        .tab.active {
            background: #111;
            color: #ff8c00;
            box-shadow: 0 0 0 2px #ff8c00;
        }

        .tab small {
            display: block;
            font-weight: normal;
            font-size: 13px;
            margin-top: 4px;
            color: #666;
        }

        .tab.active small { color: #ffb766; }

        .bloque-palabras {
            background: #111;
            border-radius: 16px;
            padding: 40px 20px;
            margin-bottom: 25px;
            border: 2px solid #ff8c00;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
        }

        .palabra {
            background: #1a1a1a;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            font-size: 32px;
            font-weight: 900;
            color: #ff8c00;
            text-transform: capitalize;
            transition: opacity 0.2s ease;
        }

        .btn-generar {
            width: 100%;
            padding: 18px;
            border-radius: 12px;
            border: none;
            background: #ff8c00;
            color: #000;
            font-size: 22px;
            font-weight: 900;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 30px;
        }

        .btn-generar:hover {
            background: #ffaa33;
            transform: translateY(-2px);
        }

        .reproductor {
            background: #1a1a1a;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 30px;
        }

        .reprod-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 15px;
        }

        .play-btn {
            width: 60px;
            height: 60px;
            border-radius: 12px;
            background: #332211;
            border: none;
            color: #ff8c00;
            font-size: 24px;
            cursor: pointer;
        }

        .bpm {
            font-size: 18px;
            font-weight: 600;
            color: #ff8c00;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .tipo-base {
            font-size: 16px;
            color: #aaa;
            text-align: right;
            font-weight: 600;
        }

        .tiempo {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            color: #777;
            margin: 10px 0;
        }

        .barra-progreso {
            width: 100%;
            height: 6px;
            background: #222;
            border-radius: 3px;
            margin-bottom: 20px;
            overflow: hidden;
        }

        .progreso { height: 100%; width: 0%; background: #ff8c00; }

        .volumen {
            width: 75%;
            height: 6px;
            background: #333;
            border-radius: 3px;
            outline: none;
            -webkit-appearance: none;
            margin-right: 10px;
        }

        .volumen::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #ff8c00;
            cursor: pointer;
        }

        .loop-btn {
            float: right;
            padding: 10px 18px;
            border-radius: 8px;
            border: 1px solid #ff8c00;
            background: #221808;
            color: #ff8c00;
            font-weight: 600;
            cursor: pointer;
        }

        .seccion {
            background: #111;
            border-radius: 16px;
            padding: 25px;
            margin-bottom: 20px;
        }

        .seccion h3 {
            font-size: 22px;
            margin-bottom: 20px;
            color: #fff;
        }

        .opcion {
            padding: 18px;
            border-radius: 12px;
            margin-bottom: 12px;
            background: #1a1a1a;
            cursor: pointer;
            transition: all 0.2s;
        }

        .opcion:last-child { margin-bottom: 0; }
        .opcion.activa {
            background: #2b1d0d;
            border: 1px solid #ff8c00;
            color: #ff8c00;
        }
        .opcion small { display: block; color: #888; margin-top: 5px; }
        .opcion.activa small { color: #ffb766; }
    </style>
</head>
<body>

<div class="header">
    <div class="logo">🎤</div>
    <button class="menu-btn">☰</button>
</div>

<div class="tabs">
    <button class="tab active">
        PALABRAS<br>ALEATORIAS
        <small>Base de rap con palabras</small>
    </button>
    <button class="tab">Base de rap con<br>palabras</button>
</div>

<div class="bloque-palabras" id="bloquePalabras">
    <div class="palabra" id="p1">secreto</div>
    <div class="palabra" id="p2">tiempo</div>
    <div class="palabra" id="p3">instinto</div>
    <div class="palabra" id="p4">viento</div>
</div>

<button class="btn-generar" onclick="generarNuevo()">🔄 GENERAR NUEVO BLOQUE</button>

<div class="reproductor">
    <div class="reprod-top">
        <button class="play-btn">▶</button>
        <span class="bpm">🎵 90 BPM</span>
        <div class="tipo-base">BOOM BAP</div>
    </div>
    <div class="barra-progreso"><div class="progreso"></div></div>
    <div class="tiempo"><span>0:00</span><span>1:04</span></div>
    <input type="range" class="volumen" min="0" max="100" value="70">
    <button class="loop-btn">🔁 Loop</button>
</div>

<div class="seccion">
    <h3>MODO</h3>
    <div class="opcion activa" onclick="cambiarModo('aleatorio', this)">
        🎲 Aleatorias
        <small>4 palabras mezcladas</small>
    </div>
    <div class="opcion" onclick="cambiarModo('rimas', this)">
        🎵 Que riman entre sí
        <small>4 palabras con la misma rima</small>
    </div>
</div>

<div class="seccion">
    <h3>FORMATO</h3>
    <div class="opcion activa" onclick="cambiarFormato(this)">📦 Bloque de 4 palabras</div>
    <div class="opcion" onclick="cambiarFormato(this)">🥁 Cambio cada 4 compases</div>
    <div class="opcion" onclick="cambiarFormato(this)">🎤 Usa una palabra por compás</div>
</div>

<script>
// 📚 BASE AMPLIA: +250 palabras variadas
const palabrasAleatorias = [
    // Emociones y sentimientos
    "amor", "dolor", "calma", "fuerza", "miedo", "paz", "ira", "ternura", "llanto", "risa",
    "esperanza", "desaliento", "fe", "duda", "certeza", "tristeza", "alegría", "melancolía",
    "pasión", "indiferencia", "nostalgia", "orgullo", "culpa", "anhelo", "desamor", "ternura",
    // Vida y camino
    "camino", "destino", "senda", "meta", "origen", "final", "paso", "huella", "rastro", "lugar",
    "mundo", "universo", "vida", "existencia", "tiempo", "hora", "instante", "eterno", "breve",
    "presente", "pasado", "futuro", "ahora", "ayer", "mañana", "viaje", "partida", "llegada",
    // Espacio y elementos
    "viento", "lluvia", "fuego", "hielo", "tierra", "mar", "cielo", "nube", "luz", "sombra",
    "oscuridad", "amanecer", "atardecer", "noche", "día", "estrella", "luna", "sol", "rayo", "niebla",
    "montaña", "valle", "río", "desierto", "calle", "barrio", "ciudad", "hogar", "esquina", "muro",
    // Mente y alma
    "alma", "mente", "corazón", "espíritu", "instinto", "razón", "sueño", "pesadilla", "idea", "pensamiento",
    "recuerdo", "olvido", "imaginación", "verdad", "mentira", "sabiduría", "locura", "conciencia", "silencio",
    "grito", "voz", "palabra", "mensaje", "secreto", "confesión", "pregunta", "respuesta", "duda", "certeza",
    // Fronteras y debilidad (como tus letras)
    "papel", "cristal", "cartón", "vidrio", "fragil", "sólido", "roto", "entero", "caída", "salto",
    "derrumbado", "erguido", "cadena", "libertad", "prisión", "vínculo", "distancia", "cercanía", "ausencia",
    "presencia", "soledad", "compañía", "abismo", "orilla", "frontera", "límite", "sin fin", "infinito",
    // Acción y lucha
    "lucha", "guerra", "paz", "victoria", "derrota", "esfuerzo", "descanso", "trabajo", "sueño", "despertar",
    "correr", "caminar", "quedarse", "irse", "buscar", "encontrar", "perder", "ganar", "creer", "dudar",
    "resistir", "rendirse", "insistir", "avanzar", "retroceder", "crecer", "morir", "nacer", "cambiar",
    // Estilo urbano / rap
    "verso", "rima", "ritmo", "base", "compás", "micrófono", "escenario", "público", "historia", "realidad",
    "calle", "esquina", "barrio", "gente", "ejemplo", "referencia", "camino", "lección", "aprendizaje", "maestro",
    "discípulo", "líder", "seguidor", "lucha", "sacrificio", "éxito", "fracaso", "camino", "meta", "objetivo",
    "plano", "proyecto", "sueño", "ambición", "desire", "necesidad", "deseo", "carencia", "riqueza", "pobreza",
    "oro", "plata", "dinero", "valor", "precio", "costo", "ganancia", "pérdida", "tiempo", "inversión",
    // Naturaleza y sensaciones
    "raíz", "flor", "hoja", "árbol", "fruto", "semilla", "tierra", "polvo", "ceniza", "llama",
    "calor", "frío", "fresco", "ardiente", "suave", "duro", "áspero", "liso", "pesado", "ligero",
    "ruido", "sonido", "melodía", "armonía", "desorden", "caos", "orden", "estructura", "forma", "fondo"
];

// 📚 GRUPOS DE RIMAS AMPLIADOS (más de 30 grupos)
const gruposRimas = [
    ["amor", "dolor", "valor", "color"],
    ["vida", "herida", "medida", "partida"],
    ["mundo", "profundo", "segundo", "inmundo"],
    ["lado", "pasado", "cuidado", "llegado"],
    ["mente", "frente", "gente", "presente"],
    ["sueño", "dueño", "pequeño", "enseño"],
    ["fuego", "juego", "luego", "ciego"],
    ["camino", "destino", "vecino", "divino"],
    ["calma", "alma", "palma", "llama"],
    ["fuerza", "certeza", "tristeza", "belleza"],
    ["silencio", "sentencio", "potencio", "comprendo"],
    ["abismo", "mismo", "optimismo", "esquema"],
    ["tiempo", "ejemplo", "campo", "lamento"],
    ["viento", "momento", "aliento", "pensamiento"],
    ["luz", "voz", "cruz", "voz"],
    ["sombra", "nombre", "hombre", "sangre"],
    ["muro", "futuro", "duro", "seguro"],
    ["lluvia", "vía", "guía", "melancolía"],
    ["estrella", "huella", "querella", "bella"],
    ["noche", "día", "fe", "vía"],
    ["calle", "detalle", "falle", "talle"],
    ["corazón", "pasión", "razón", "misión"],
    ["libertad", "verdad", "edad", "voluntad"],
    ["senda", "leyenda", "descendencia", "entendencia"],
    ["rastro", "bastante", "instante", "delante"],
    ["fragil", "util", "senil", "gentil"],
    ["papel", "cruel", "nivel", "revés"],
    ["cristal", "mal", "real", "mortal"],
    ["cartón", "pasión", "razón", "canción"],
    ["vidrio", "riesgo", "fuego", "juego"],
    ["caída", "herida", "medida", "partida"],
    ["salida", "ida", "vida", "medida"],
    ["llanto", "encanto", "manto", "espanto"],
    ["grito", "maldito", "infinito", "contrito"],
    ["canto", "tanto", "manto", "espanto"],
    ["aliento", "siento", "cuento", "lamento"]
];

let modoActual = 'aleatorio';

function generarNuevo() {
    let nuevasPalabras = [];
    if (modoActual === 'aleatorio') {
        while (nuevasPalabras.length < 4) {
            const p = palabrasAleatorias[Math.floor(Math.random() * palabrasAleatorias.length)];
            if (!nuevasPalabras.includes(p)) nuevasPalabras.push(p);
        }
    } else {
        const grupo = gruposRimas[Math.floor(Math.random() * gruposRimas.length)];
        nuevasPalabras = [...grupo];
        nuevasPalabras.sort(() => Math.random() - 0.5);
    }

    const ids = ['p1', 'p2', 'p3', 'p4'];
    ids.forEach((id, i) => {
        const el = document.getElementById(id);
        el.style.opacity = 0;
        setTimeout(() => {
            el.textContent = nuevasPalabras[i];
            el.style.opacity = 1;
        }, 200);
    });
}

function cambiarModo(modo, elemento) {
    modoActual = modo;
    document.querySelectorAll('.seccion:nth-child(7) .opcion').forEach(el => el.classList.remove('activa'));
    elemento.classList.add('activa');
    generarNuevo();
}

function cambiarFormato(elemento) {
    document.querySelectorAll('.seccion:nth-child(8) .opcion').forEach(el => el.classList.remove('activa'));
    elemento.classList.add('activa');
}
</script>
</body>
</html>
